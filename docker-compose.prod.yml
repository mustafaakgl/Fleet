# Production overlay — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  backend:
    environment:
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      SMTP_ENABLED: ${SMTP_ENABLED:-true}
      SMTP_HOST: ${SMTP_HOST:?SMTP_HOST required}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:?SMTP_FROM required}
      DATA_CONTROLLER_NAME: ${DATA_CONTROLLER_NAME:?DATA_CONTROLLER_NAME required}
      PRIVACY_CONTACT_EMAIL: ${PRIVACY_CONTACT_EMAIL:?PRIVACY_CONTACT_EMAIL required}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-s3}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-eu-central-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID required}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY required}
      METRICS_TOKEN: ${METRICS_TOKEN:?METRICS_TOKEN required}
      SENTRY_DSN: ${SENTRY_DSN:-}
      STRIPE_ENABLED: ${STRIPE_ENABLED:-true}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:?STRIPE_SECRET_KEY required when billing enabled}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:?STRIPE_WEBHOOK_SECRET required}
      STRIPE_PRICE_BASIC: ${STRIPE_PRICE_BASIC:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE:-}
      STRIPE_AUTOMATIC_TAX: ${STRIPE_AUTOMATIC_TAX:-true}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    restart: always

  frontend:
    build:
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL required}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_DATA_CONTROLLER_NAME: ${DATA_CONTROLLER_NAME:-}
      NEXT_PUBLIC_PRIVACY_CONTACT_EMAIL: ${PRIVACY_CONTACT_EMAIL:-}
      NEXT_PUBLIC_SUPPORT_EMAIL: ${NEXT_PUBLIC_SUPPORT_EMAIL:-support@myfleet.app}
      NEXT_PUBLIC_SUPPORT_HOURS: ${NEXT_PUBLIC_SUPPORT_HOURS:-Mo–Fr 9–17 Uhr (CET)}
    restart: always

  postgres:
    restart: always
