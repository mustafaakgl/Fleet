name: CI

on:
  push:
    branches: [main, master, develop, qa-langgraph-full-orchestrator]
  pull_request:
    branches: [main, master, develop, qa-langgraph-full-orchestrator]

jobs:
  backend-security-auth:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fleet
          POSTGRES_PASSWORD: fleet123
          POSTGRES_DB: fleet
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fleet -d fleet"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://fleet:fleet123@localhost:5432/fleet
      JWT_SECRET: ci_test_jwt_secret_minimum_32_chars_long
      NODE_ENV: test
      REFRESH_TOKEN_TTL_DAYS: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm run build
      - run: npm run test
      - name: Security audit (non-blocking)
        continue-on-error: true
        run: npm audit --audit-level=high

  tenant-isolation:
    runs-on: ubuntu-latest
    needs: [backend-security-auth]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fleet
          POSTGRES_PASSWORD: fleet123
          POSTGRES_DB: fleet
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fleet -d fleet"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://fleet:fleet123@localhost:5432/fleet
      JWT_SECRET: ci_test_jwt_secret_minimum_32_chars_long
      NODE_ENV: test
      REFRESH_TOKEN_TTL_DAYS: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npx ts-node --transpile-only scripts/tenant-isolation-check.ts
      - name: Load test script present
        run: test -f ../scripts/load/k6-smoke.js

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Security audit (non-blocking)
        continue-on-error: true
        run: npm audit --audit-level=high
